name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # base-href: сайт живёт в подпапке username.github.io/<repo>/,
      # поэтому все ссылки на ассеты должны быть относительно неё
      - run: npx ng build --base-href "/${{ github.event.repository.name }}/"

      # без .nojekyll GitHub Pages прогоняет сборку через Jekyll,
      # который игнорирует файлы/папки, начинающиеся с "_"
      - run: touch dist/skyline-r34/browser/.nojekyll

      # SPA-фоллбек: прямой переход на несуществующий путь отдаёт index.html
      - run: cp dist/skyline-r34/browser/index.html dist/skyline-r34/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/skyline-r34/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
