<div class="loader" [class.fade-out]="loaded()">
  <div class="loader-inner">
    <div class="loader-brand">GT·R · BNR34</div>
    <div class="loader-track">
      <div class="loader-fill" [style.width.%]="progress()"></div>
    </div>
    <div class="loader-meta">
      <span>{{ t().loaderText }}</span>
      <span>{{ progress() }}%</span>
    </div>
  </div>
</div>
